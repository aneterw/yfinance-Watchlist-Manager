name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android_version/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: project

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git python3 python3-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            openjdk-17-jdk-headless \
            autoconf automake libtool unzip curl wget \
            ant ant-optional

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip buildozer cython kivy

      - name: Setup Android SDK and accept licenses
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools
          mv cmdline-tools latest
          
          # Accept all SDK licenses
          mkdir -p $HOME/android-sdk/cmdline-tools/latest/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/android-sdk/cmdline-tools/latest/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a64d1f" >> $HOME/android-sdk/cmdline-tools/latest/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $HOME/android-sdk/cmdline-tools/latest/licenses/android-sdk-license
          
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # Install required SDK packages
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;25.2.9519653"
          
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build APK with Buildozer
        run: |
          cd $GITHUB_WORKSPACE/project/android_version
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/25.2.9519653
          buildozer android debug 2>&1 | tee /tmp/build.log | tail -100
        env:
          ANDROID_HOME: $HOME/android-sdk
          ANDROID_SDK_ROOT: $HOME/android-sdk
          ANDROID_NDK_ROOT: $HOME/android-sdk/ndk/25.2.9519653

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-apk
          path: |
            $GITHUB_WORKSPACE/project/android_version/bin/*.apk
            $HOME/.buildozer/android/platform/build-*/dists/*/build/outputs/apk/**/*.apk
            $HOME/.buildozer/android/app/build/outputs/apk/**/*.apk
          retention-days: 14
          if-no-files-found: warn

      - name: Debug APK location on failure
        if: failure()
        run: |
          echo "=== Looking for APK files ==="
          find $HOME -name "*.apk" 2>/dev/null | head -20
          ls -la $GITHUB_WORKSPACE/project/android_version/bin/ 2>/dev/null || echo "bin/ not found"
          ls -la $HOME/.buildozer/android/platform/ 2>/dev/null || echo ".buildozer/platform/ not found"
          echo "=== Build log ==="
          cat /tmp/build.log 2>/dev/null | tail -100
