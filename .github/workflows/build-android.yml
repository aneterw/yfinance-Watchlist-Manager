# GitHub Actions Workflow for Android APK Build
# This workflow uses buildozer to compile your Kivy app into an APK
# Run it from: https://github.com/settings/actions

name: Build Android APK

on:
  workflow_dispatch:  # Manual trigger from Actions tab
  push:
    branches: [main, master]
    paths:
      - 'android_version/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: project

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            git \
            python3 \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            unzip \
            curl

      - name: Setup Android SDK & NDK
        run: |
          mkdir -p ${{ github.workspace }}/android-sdk
          cd ${{ github.workspace }}/android-sdk
          curl -sLO https://dl.google.com/android/repository/commandlinetools-linux-11716616_latest.zip -o cmdline-tools.zip
          unzip -qo cmdline-tools.zip
          mkdir -p cmdline-tools
          mv cmdline-tools latest
          export ANDROID_HOME=$PWD
          export PATH=$PATH:$PWD/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "platforms;android-33" "build-tools;33.0.0"
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_HOME=$PWD" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$PWD" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$PWD/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build APK with Buildozer
        run: |
          cd ${{ github.workspace }}/project/android_version
          buildozer android debug 2>&1 | tail -50
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
          ANDROID_NDK_ROOT: ${{ github.workspace }}/android-sdk/ndk/25.2.9519653

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-apk
          path: project/android_version/bin/*.apk
          retention-days: 14
