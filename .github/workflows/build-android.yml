name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android_version/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: project

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git python3 python3-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            openjdk-17-jdk-headless \
            autoconf automake libtool unzip curl wget \
            ant ant-optional

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy==2.3.1

      - name: Setup Android SDK and NDK manually
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          
          # Download Android command-line tools
          curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          
          # Accept SDK licenses FIRST
          mkdir -p cmdline-tools/latest/licenses
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a64d1f\n84831b9409646a918e30573bab4c9c91346d8abd\n' > cmdline-tools/latest/licenses/android-sdk-license
          
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # Install SDK packages (this will work because licenses are accepted)
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973"
          
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/27.0.12077973" >> $GITHUB_ENV
          
          # Verify installation
          ls -la $HOME/android-sdk/
          ls -la $HOME/android-sdk/platforms/
          ls -la $HOME/android-sdk/build-tools/
          ls -la $HOME/android-sdk/ndk/

      - name: Build APK with Buildozer
        run: |
          cd $GITHUB_WORKSPACE/project/android_version
          
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/27.0.12077973
          
          # Show environment
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          echo "PATH=$PATH"
          
          # Build with error handling and logging
          set -e
          buildozer android debug 2>&1 | tee /tmp/build.log
          
          # Show what was built
          echo "=== Build output ==="
          ls -la bin/ 2>/dev/null || echo "No bin directory"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Find APK files
        run: |
          echo "=== Searching for APK ==="
          echo "Looking in project/android_version/bin/"
          find $GITHUB_WORKSPACE/project/android_version -name "*.apk" -type f 2>/dev/null
          echo "Looking in .buildozer"
          find $HOME/.buildozer -name "*.apk" -type f 2>/dev/null
          echo "Looking in home"
          find $HOME -maxdepth 4 -name "*.apk" -type f 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-apk
          path: |
            $GITHUB_WORKSPACE/project/android_version/bin/*.apk
            $HOME/.buildozer/android/platform/build-*/dists/**/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Build log tail ==="
          tail -200 /tmp/build.log 2>/dev/null || echo "No build log found"
          echo "=== APK search ==="
          find $HOME -name "*.apk" -type f 2>/dev/null | head -20
          echo "=== .buildozer structure ==="
          ls -la $HOME/.buildozer/android/platform/ 2>/dev/null || echo "No .buildozer/platform"
          echo "=== dists ==="
          find $HOME/.buildozer -name "dists" -type d 2>/dev/null
          find $HOME/.buildozer -name "*.apk" 2>/dev/null
